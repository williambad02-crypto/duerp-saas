<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#FAF6ED"/>
  <!-- Immeuble de bureau -->
  <rect x="120" y="100" width="160" height="220" rx="6" fill="white" stroke="#E5DDC9" stroke-width="2"/>
  <!-- En-tête immeuble -->
  <rect x="120" y="100" width="160" height="30" rx="6" fill="#031948"/>
  <rect x="120" y="116" width="160" height="14" fill="#031948"/>
  <!-- Rangées fenêtres -->
  <rect x="140" y="150" width="25" height="20" rx="2" fill="#E5DDC9"/>
  <rect x="180" y="150" width="25" height="20" rx="2" fill="#E5DDC9"/>
  <rect x="220" y="150" width="25" height="20" rx="2" fill="#0EA5E9" opacity="0.5"/>
  <rect x="140" y="185" width="25" height="20" rx="2" fill="#E5DDC9"/>
  <rect x="180" y="185" width="25" height="20" rx="2" fill="#0EA5E9" opacity="0.5"/>
  <rect x="220" y="185" width="25" height="20" rx="2" fill="#E5DDC9"/>
  <rect x="140" y="220" width="25" height="20" rx="2" fill="#E5DDC9"/>
  <rect x="180" y="220" width="25" height="20" rx="2" fill="#E5DDC9"/>
  <rect x="220" y="220" width="25" height="20" rx="2" fill="#E5DDC9"/>
  <!-- Porte entrée -->
  <rect x="183" y="278" width="34" height="42" rx="3" fill="#031948" opacity="0.7"/>
  <!-- Enseigne "Cabinet HSE" -->
  <rect x="126" y="108" width="148" height="14" rx="3" fill="transparent"/>
  <text x="200" y="119" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="white" letter-spacing="1">CABINET HSE</text>
  <!-- Facture avec montant -->
  <rect x="260" y="200" width="110" height="80" rx="8" fill="white" stroke="#E5DDC9" stroke-width="1.5" filter="url(#sh2)"/>
  <defs>
    <filter id="sh2">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#031948" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect x="260" y="200" width="110" height="20" rx="8" fill="#031948"/>
  <rect x="260" y="210" width="110" height="10" fill="#031948"/>
  <text x="315" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="white">FACTURE</text>
  <text x="315" y="238" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#031948">1 500€</text>
  <text x="315" y="255" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#8B6F47">audit one-shot</text>
  <text x="315" y="270" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#64748B">À renouveler chaque année</text>
  <!-- Flèche récurrence -->
  <path d="M 340 290 Q 360 310 340 330 Q 320 350 300 330" stroke="#EA580C" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="296,332 300,322 308,329" fill="#EA580C"/>
</svg>
