  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#031948" flood-opacity="0.08"/>
    </filter>
  </defs>
  <!-- En-tête vert Excel -->
  <rect x="80" y="60" width="240" height="40" rx="10" fill="#0369A1"/>
