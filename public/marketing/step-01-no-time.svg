<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#FAF6ED"/>
  <!-- Horloge -->
  <circle cx="200" cy="180" r="110" fill="white" stroke="#E5DDC9" stroke-width="2"/>
  <circle cx="200" cy="180" r="100" fill="white" stroke="#031948" stroke-width="8"/>
  <!-- Graduations -->
  <line x1="200" y1="88" x2="200" y2="100" stroke="#031948" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="260" x2="200" y2="272" stroke="#031948" stroke-width="3" stroke-linecap="round"/>
  <line x1="108" y1="180" x2="120" y2="180" stroke="#031948" stroke-width="3" stroke-linecap="round"/>
  <line x1="280" y1="180" x2="292" y2="180" stroke="#031948" stroke-width="3" stroke-linecap="round"/>
  <!-- Aiguille minutes — presque à la fin (11h55) -->
  <line x1="200" y1="180" x2="200" y2="100" stroke="#031948" stroke-width="4" stroke-linecap="round"/>
  <!-- Aiguille heures — sur 11 -->
  <line x1="200" y1="180" x2="158" y2="133" stroke="#031948" stroke-width="6" stroke-linecap="round"/>
  <!-- Centre -->
  <circle cx="200" cy="180" r="7" fill="#031948"/>
  <!-- Point rouge urgence -->
  <circle cx="200" cy="100" r="8" fill="#EF4444"/>
  <!-- Liste de tâches en bas à droite — empilées -->
  <rect x="230" y="270" width="110" height="18" rx="4" fill="#E5DDC9"/>
  <rect x="230" y="294" width="90" height="18" rx="4" fill="#E5DDC9"/>
  <rect x="230" y="318" width="100" height="18" rx="4" fill="#E5DDC9"/>
  <!-- Croix "pas le temps" -->
  <circle cx="340" cy="340" r="20" fill="#FEE2E2"/>
  <line x1="331" y1="331" x2="349" y2="349" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="349" y1="331" x2="331" y2="349" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  <!-- Texte label -->
  <rect x="80" y="310" width="120" height="32" rx="16" fill="#FDF4D3" stroke="#E5DDC9"/>
  <text x="140" y="330" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8B6F47">Pas le temps</text>
</svg>
